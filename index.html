<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">

  <a href="index.html" class="logo">
    ☕ SUNA CAFE
  </a>

  <button class="menu-btn">☰</button>

  <nav class="nav-menu">
  <a href="menu.html">☕ メニュー</a>
  <a href="shop.html">🏠 店舗情報</a>
  <a href="#">📷 Instagram</a>
</nav>

</header>


 <section class="slideshow">

    <img src="https://images.unsplash.com/photo-1554118811-1e0d58224f24?w=1920"
     class="slide active">

<img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=1920"
     class="slide">

<img src="https://images.unsplash.com/photo-1445116572660-236099ec97a0?w=1920"
     class="slide">


    <div class="overlay">
        <h1>SUNA CAFE</h1>
        <p>創業30年の老舗喫茶店</p>
    </div>

</section>



  <main class="main">
    <h1>SUNA CAFE</h1>
    <h2>〜 創業30年の老舗喫茶店 〜</h2>

    <section class="intro">
      <img src="images/cafe.jpg" class="photo" alt="SUNA CAFEの店内">
      <div class="text">
        <h3>笑顔で営む、<br>地域に愛される喫茶店。</h3>
        <p>[営業時間]</p>
        <p>平日・土曜：9:00〜18:00</p>
        <p>定休日：日曜日</p>
        <p>駐車場あり（3台）</p>
      </div>
    </section>

   <section class="menu-section">

  <div class="menu-text">
    <h3>[おすすめメニュー]</h3>

    <p>名物ブレンドコーヒー</p>
    <p>ハンドドリップコーヒー</p>

    <p>
      豆の個性を生かし、<br>
      一杯一杯丁寧に抽出しています。
    </p>
  </div>

  <img src="images/coffee.jpg"
       class="coffee-photo"
       alt="ハンドドリップコーヒー">

</section>

   <section class="buttons">
  <a href="menu.html" class="card">
    <span class="icon">📍</span>
    <strong>メニュー</strong>
    <span>別ページ</span>
  </a>

<a href="shop.html" class="card">
  <span class="icon">🏠</span>
  <strong>店舗情報</strong>
  <span>別ページ</span>
</a>
</section>
  </main>

  <footer class="footer">
    <p>電話番号　0000-000-000</p>
    <p>メールアドレス　aaaa.aaa@aa.co.jp</p>
  </footer>

<script>
const slides = document.querySelectorAll(".slide");
let current = 0;

setInterval(() => {

    slides[current].classList.remove("active");

    current++;

    if(current >= slides.length){
        current = 0;
    }

    slides[current].classList.add("active");

}, 3000);
const menuBtn = document.querySelector(".menu-btn");
const navMenu = document.querySelector(".nav-menu");

menuBtn.addEventListener("click", () => {

  navMenu.classList.toggle("active");

  if(navMenu.classList.contains("active")){
      menuBtn.textContent = "✕";
  }else{
      menuBtn.textContent = "☰";
  }

});
</script>

</body>
</html>
